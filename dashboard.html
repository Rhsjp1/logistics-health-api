<script>
  const API_BASE_URL = "https://logistics-health-api.vercel.app";
  const history = [];

  document.getElementById("api-url").textContent = API_BASE_URL + "/api/scr";
  document.getElementById("api-url").style.color = "#22c55e";

  function getTierInfo(score) {
    if (score >= 85) return { label: "Excellent", color: "#22c55e", pill: "#dcfce7", pillText: "#166534" };
    if (score >= 70) return { label: "Good", color: "#84cc16", pill: "#ecfccb", pillText: "#3f6212" };
    if (score >= 55) return { label: "Fair", color: "#eab308", pill: "#fef9c3", pillText: "#713f12" };
    if (score >= 40) return { label: "At Risk", color: "#f97316", pill: "#ffedd5", pillText: "#7c2d12" };
    return { label: "Critical", color: "#ef4444", pill: "#fee2e2", pillText: "#7f1d1d" };
  }

  function barColor(val) {
    if (val >= 80) return "#22c55e";
    if (val >= 65) return "#84cc16";
    if (val >= 50) return "#eab308";
    return "#ef4444";
  }

  async function fetchLiveScore(origin, dest, mode) {
    const url = `${API_BASE_URL}/api/scr?origin=${origin}&dest=${dest}&mode=${mode}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("API returned " + res.status);
    return res.json();
  }

  async function runScore() {
    const origin = document.getElementById("origin").value;
    const dest = document.getElementById("dest").value;
    const mode = document.getElementById("mode").value;
    const btn = document.getElementById("run-btn");

    if (origin === dest) {
      alert("Origin and destination must be different.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Scoring...";

    let data;
    try {
      data = await fetchLiveScore(origin, dest, mode);
    } catch (err) {
      alert("API error: " + err.message);
      btn.disabled = false;
      btn.textContent = "Score lane";
      return;
    }

    btn.disabled = false;
    btn.textContent = "Score lane";

    const score = data.scr_score;
    const tier = getTierInfo(score);
    const bd = data.breakdown;
    const comp = data.components;
    const pct = (score / 100) * 251.2;
    const originText = document.getElementById("origin").selectedOptions[0].text;
    const destText = document.getElementById("dest").selectedOptions[0].text;

    document.getElementById("result-area").innerHTML = `
      <div class="score-card">
        <div class="score-ring">
          <svg width="90" height="90" viewBox="0 0 90 90">
            <circle cx="45" cy="45" r="40" fill="none" stroke="#f0f0ee" stroke-width="7"></circle>
            <circle cx="45" cy="45" r="40" fill="none" stroke="${tier.color}" stroke-width="7"
              stroke-dasharray="${pct} 251.2"
              stroke-dashoffset="62.8"
              stroke-linecap="round"
              transform="rotate(-90 45 45)"
              style="transition: stroke-dasharray 0.7s ease;"></circle>
            <text x="45" y="51" text-anchor="middle" font-size="20" font-weight="500" fill="#1a1a18">${score}</text>
          </svg>
        </div>
        <div class="score-info">
          <div class="score-tier" style="color: ${tier.color}">${tier.label}</div>
          <div class="score-lane">${originText.split("—")[0].trim()} → ${destText.split("—")[0].trim()} &nbsp;·&nbsp; ${mode.charAt(0).toUpperCase() + mode.slice(1)}</div>
          <div class="score-note">Scored at ${new Date().toLocaleTimeString()}</div>
        </div>
      </div>
      <div class="breakdown">
        <div class="bcard">
          <div class="blabel">Origin weather score</div>
          <div class="bval" style="color:${barColor(bd.origin_weather_score)}">${bd.origin_weather_score}</div>
          <div class="bbar">
            <div class="bfill" style="width:${bd.origin_weather_score}%;background:${barColor(bd.origin_weather_score)}"></div>
          </div>
        </div>
        <div class="bcard">
          <div class="blabel">Destination weather score</div>
          <div class="bval" style="color:${barColor(bd.dest_weather_score)}">${bd.dest_weather_score}</div>
          <div class="bbar">
            <div class="bfill" style="width:${bd.dest_weather_score}%;background:${barColor(bd.dest_weather_score)}"></div>
          </div>
        </div>
        <div class="bcard">
          <div class="blabel">Route efficiency</div>
          <div style="font-size:11px;color:#6b6b67;margin-top:-2px;margin-bottom:8px;">Powered by openrouteservice</div>
          <div class="bval" style="color:${barColor(comp.traffic.score)}">${comp.traffic.score}</div>
          <div class="bbar">
            <div class="bfill" style="width:${comp.traffic.score}%;background:${barColor(comp.traffic.score)}"></div>
          </div>
        </div>
        <div class="bcard">
          <div class="blabel">Mode baseline score</div>
          <div class="bval" style="color:${barColor(bd.mode_baseline_score)}">${bd.mode_baseline_score}</div>
          <div class="bbar">
            <div class="bfill" style="width:${bd.mode_baseline_score}%;background:${barColor(bd.mode_baseline_score)}"></div>
          </div>
        </div>
      </div>`;

    history.unshift({ origin, dest, mode, score, tier, time: new Date().toLocaleTimeString() });
    renderHistory();
  }

  function renderHistory() {
    const body = document.getElementById("hist-body");
    if (!history.length) {
      body.innerHTML = '<div class="placeholder">No scores yet</div>';
      return;
    }

    body.innerHTML = `
      <div class="hist-row hist-head">
        <div>Origin</div><div>Destination</div><div class="hist-mode">Mode</div><div>Score</div><div>Tier</div>
      </div>` +
      history.slice(0, 10).map(r => `
      <div class="hist-row">
        <div>${r.origin}</div><div>${r.dest}</div>
        <div class="hist-mode" style="text-transform:capitalize">${r.mode}</div>
        <div style="font-weight:500">${r.score}</div>
        <div><span class="pill" style="background:${r.tier.pill};color:${r.tier.pillText}">${r.tier.label}</span></div>
      </div>`).join("");
  }
</script>
