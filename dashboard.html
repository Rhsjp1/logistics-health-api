<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logistics Health Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      min-height: 100vh;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    .sub {
      margin: 0 0 28px;
      color: #94a3b8;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(8px);
    }
    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 10px;
    }
    .value {
      font-size: 32px;
      font-weight: 700;
      color: #f8fafc;
    }
    .panel {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      overflow: hidden;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }
    .status {
      margin: 0 0 16px;
      color: #cbd5e1;
    }
    .error {
      margin: 0 0 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      color: #fecaca;
      white-space: pre-wrap;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      color: #e2e8f0;
    }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      vertical-align: top;
    }
    th {
      color: #94a3b8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .muted {
      color: #94a3b8;
    }
    .hidden {
      display: none;
    }
    .footer-note {
      margin-top: 16px;
      font-size: 13px;
      color: #94a3b8;
    }
    @media (max-width: 800px) {
      .cards {
        grid-template-columns: 1fr;
      }
      .value {
        font-size: 28px;
      }
      table, thead, tbody, th, td, tr {
        display: block;
      }
      thead {
        display: none;
      }
      tr {
        margin-bottom: 12px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        padding: 8px;
        background: rgba(255,255,255,0.04);
      }
      td {
        border-bottom: none;
        padding: 8px;
      }
      td::before {
        content: attr(data-label);
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #94a3b8;
        margin-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🚚 Logistics Health Dashboard</h1>
    <p class="sub">Real-time route and shipment health metrics</p>

    <div class="cards">
      <div class="card">
        <div class="label">Total Routes</div>
        <div class="value" id="totalRoutes">—</div>
      </div>
      <div class="card">
        <div class="label">Avg Health Score</div>
        <div class="value" id="avgScore">—</div>
      </div>
      <div class="card">
        <div class="label">Recent Records</div>
        <div class="value" id="recentCount">—</div>
      </div>
    </div>

    <div class="panel">
      <h2>Route History</h2>
      <div id="loading" class="status">Loading dashboard data...</div>
      <div id="error"></div>

      <table id="historyTable" class="hidden">
        <thead>
          <tr>
            <th>Lane</th>
            <th>Mode</th>
            <th>Score</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div class="footer-note">
        If this table stays empty, the API is likely rejecting the request or returning no rows.
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "REPLACE_WITH_YOUR_LOGISTICS_API_KEY";

    async function loadDashboard() {
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");
      const historyTable = document.getElementById("historyTable");

      loading.classList.remove("hidden");
      historyTable.classList.add("hidden");
      error.innerHTML = "";

      try {
        const url = `/api/history?key=${encodeURIComponent(API_KEY)}`;
        const response = await fetch(url);

        if (!response.ok) {
          const text = await response.text();
          throw new Error(`HTTP ${response.status}\n${text}`);
        }

        const data = await response.json();
        const rows = Array.isArray(data.rows) ? data.rows : [];

        renderDashboard(rows);

        loading.classList.add("hidden");
        historyTable.classList.remove("hidden");
      } catch (err) {
        loading.classList.add("hidden");
        error.innerHTML = `<div class="error">Error loading dashboard:\n${err.message}</div>`;
      }
    }

    function renderDashboard(rows) {
      document.getElementById("totalRoutes").textContent = rows.length;

      const validScores = rows
        .map(r => Number(r.score))
        .filter(s => !Number.isNaN(s));

      const avgScore = validScores.length
        ? (validScores.reduce((a, b) => a + b, 0) / validScores.length).toFixed(1)
        : "—";

      document.getElementById("avgScore").textContent = avgScore;

      const oneHourAgo = new Date(Date.now() - 3600000);

      const recentCount = rows.filter(r => {
        const ts = r.timestamp || r.created_at;
        return ts && !isNaN(Date.parse(ts)) && new Date(ts) > oneHourAgo;
      }).length;

      document.getElementById("recentCount").textContent = recentCount;

      const tableBody = document.getElementById("tableBody");

      if (!rows.length) {
        tableBody.innerHTML = `
          <tr>
            <td data-label="Lane" colspan="4" class="muted">No history rows returned yet.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = rows.map(row => {
        const lane =
          row.lane ||
          (row.origin && row.destination ? `${row.origin} → ${row.destination}` : "—");

        const mode = row.mode || "—";
        const score = row.score ?? "—";

        const rawTime = row.timestamp || row.created_at;
        const time = rawTime && !isNaN(Date.parse(rawTime))
          ? new Date(rawTime).toLocaleString()
          : "—";

        return `
          <tr>
            <td data-label="Lane">${lane}</td>
            <td data-label="Mode">${mode}</td>
            <td data-label="Score">${score}</td>
            <td data-label="Timestamp">${time}</td>
          </tr>
        `;
      }).join("");
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
