<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Health Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .status {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .status-card {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .status-card.success {
            border-left-color: #10b981;
        }
        .status-card.warning {
            border-left-color: #f59e0b;
        }
        .status-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .status-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        thead {
            background: #f9fafb;
            border-bottom: 2px solid #e5e7eb;
        }
        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            color: #555;
        }
        tr:hover {
            background: #f9fafb;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚚 Logistics Health Dashboard</h1>
        <p style="color: #666; margin-bottom: 20px;">Real-time route and shipment health metrics</p>
        
        <div class="status">
            <div class="status-card success">
                <div class="status-label">Total Routes</div>
                <div class="status-value" id="totalRoutes">—</div>
            </div>
            <div class="status-card">
                <div class="status-label">Avg Health Score</div>
                <div class="status-value" id="avgScore">—</div>
            </div>
            <div class="status-card warning">
                <div class="status-label">Recent Records</div>
                <div class="status-value" id="recentCount">—</div>
            </div>
        </div>

        <h2 style="margin-top: 30px; color: #333; font-size: 18px; margin-bottom: 15px;">Route History</h2>
        <div id="loading" class="loading">Loading data...</div>
        <div id="error"></div>
        <table id="historyTable" style="display: none;">
            <thead>
                <tr>
                    <th>Route</th>
                    <th>Mode</th>
                    <th>Health Score</th>
                    <th>Created</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('/api/history');
                if (!response.ok) throw new Error('Failed to fetch data');
                
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                document.getElementById('error').innerHTML = `
                    <div class="error">Error loading dashboard: ${error.message}</div>
                `;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderDashboard(rows) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('historyTable').style.display = 'table';

            // Update status cards
            document.getElementById('totalRoutes').textContent = rows.length;
            
            const validScores = rows
                .map(r => r.score)
                .filter(s => s !== null && s !== undefined && !isNaN(s));
            const avgScore = validScores.length > 0 
                ? (validScores.reduce((a, b) => a + b, 0) / validScores.length).toFixed(1)
                : '—';
            document.getElementById('avgScore').textContent = avgScore;
            
            const oneHourAgo = new Date(Date.now() - 3600000);
            const recentCount = rows.filter(r => 
                r.created_at && new Date(r.created_at) > oneHourAgo
            ).length;
            document.getElementById('recentCount').textContent = recentCount;

            // Render table rows
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = rows.map(row => `
                <tr>
                    <td>${row.origin} → ${row.destination}</td>
                    <td>${row.mode || "—"}</td>
                    <td>${row.score ?? "—"}</td>
                    <td>${row.created_at ? new Date(row.created_at).toLocaleString() : "—"}</td>
                </tr>
            `).join("");
        }

        // Load dashboard on page load
        loadDashboard();
        // Refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
